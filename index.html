.case-meta-row {

}
.case-meta-main { display: flex; flex-wrap: wrap; gap: 28px; }

}
.case-note { font-size: 14px; color: #8A877D; margin-top: 16px; }

.case-body { max-width: 1100px; margin: 0 auto; padding: 44px 32px 30px; }

/* Section: prose */
.s-prose { max-width: 860px; margin: 0 auto 46px; }
.s-prose--gap-before { padding-top: 34px; }
.s-heading { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #232220; margin-bottom: 18px; line-height: 1.2; }
.s-subheading { font-size: 21px; font-weight: 700; letter-spacing: -0.015em; color: #232220; margin-bottom: 12px; line-height: 1.25; }
.s-para { font-size: 18px; line-height: 1.62; color: #3D3B36; margin-bottom: 14px; }
.s-list { margin: 4px 0 18px; }
.s-list-item { display: flex; gap: 14px; padding: 7px 0; align-items: baseline; }
.s-list-marker { font-size: 14px; color: var(--accent-pink); flex-shrink: 0; min-width: 16px; font-weight: 600; }
.s-list-marker--dash { color: #232220; }
.s-list-text { font-size: 17px; line-height: 1.55; color: #3D3B36; }
.s-list-lead { font-weight: 600; color: #232220; }

/* Section: note */
.s-note {
  max-width: 860px; margin: -24px auto 46px;
  background: #EEF1F4; border-radius: 16px; padding: 22px 24px;
}
.s-note p { font-size: 18px; line-height: 1.58; color: #232220; }

/* Section: care */
.s-care { max-width: 860px; margin: 0 auto 46px; }
.s-care-head { display: flex; align-items: center; gap: 11px; margin-bottom: 16px; }
.s-care-heading { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #232220; line-height: 1.2; }
.s-care-item { font-size: 17px; line-height: 1.58; color: #3D3B36; padding: 10px 0; border-top: 1px solid #ECE8E0; }
.s-care-head + .s-care-item { border-top: none; padding-top: 0; }
.s-care-item-lead { font-weight: 600; color: #232220; }

/* Section: metrics */
.s-metrics { max-width: 860px; margin: 0 auto 46px; }
.s-stats-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
.s-stat {
  min-width: 0; background: #fff; border: 1px solid #ECE8E0; border-radius: 16px;

}
.s-stat-val {
  font-size: clamp(30px, 3.3vw, 40px); font-weight: 700; letter-spacing: 0; line-height: 1.05;
  display: flex; align-items: baseline; gap: 8px; color: #232220; flex-wrap: nowrap; white-space: nowrap;
}
.s-stat-from { color: #232220; }
.s-stat-arrow { color: var(--accent-pink); font-size: 26px; }
.s-stat-label { font-size: 14px; line-height: 1.35; color: #232220; margin-top: 12px; overflow-wrap: anywhere; }
.s-metrics-note { font-size: 15px; line-height: 1.55; color: #232220; margin-top: 18px; }

/* Section: image */
.s-image { max-width: 1100px; margin: 0 auto 46px; }
.s-image img { width: 100%; border-radius: 16px; display: block; }
.s-image + .s-prose,
.s-images-grid + .s-prose,
.s-image + .s-metrics,
.s-images-grid + .s-metrics { padding-top: 28px; }
.s-image-placeholder {
  width: 100%; aspect-ratio: 16/9; border-radius: 16px;
  background: repeating-linear-gradient(135deg, #EDE9E0, #EDE9E0 10px, #F2EEE6 10px, #F2EEE6 20px);
  display: flex; align-items: center; justify-content: center;
}
.s-image-placeholder span { font-size: 13px; color: #A39E94; text-align: center; line-height: 1.5; padding: 16px; }

/* Section: images grid */
.s-images-grid { max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 0 auto 46px; align-items: start; }
.s-images-cell {
  aspect-ratio: 4/5; border-radius: 16px;
  background: repeating-linear-gradient(135deg, #EDE9E0, #EDE9E0 10px, #F2EEE6 10px, #F2EEE6 20px);
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.s-images-cell span { font-size: 12px; color: #A39E94; text-align: center; line-height: 1.5; }
.s-images-cell--media { aspect-ratio: auto; background: transparent; padding: 0; display: block; }
.s-images-media {
  border-radius: 16px; background: transparent;
  display: block; overflow: hidden;
}
.s-images-media img { width: 100%; height: auto; border-radius: 14px; display: block; }
.s-images-caption { font-size: 14px; line-height: 1.45; color: #232220; margin-top: 10px; }
.s-images-caption strong { color: var(--accent-pink); font-weight: 700; }

/* Section: before / after */
.s-ba { max-width: 860px; display: grid; grid-template-columns: 1fr 1fr; gap: 36px; margin: 0 auto 46px; }
.s-ba-col { padding: 0; }
.s-ba-before { padding: 18px 0; }
.s-ba-after { background: #EEF1F4; border-radius: 16px; padding: 18px 20px; }
.s-ba-label { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 12px; }
.s-ba-before .s-ba-label, .s-ba-after .s-ba-label { color: #232220; }
.s-ba-item { font-size: 15px; line-height: 1.5; color: #232220; padding: 7px 0; }
.s-ba-item + .s-ba-item { border-top: 1px solid #ECE8E0; }

.case-divider { max-width: 860px; margin: 0 auto; padding: 24px 32px 0; }
.case-divider-line { border-top: 1px solid #E5E1D8; }
.case-footer {
  max-width: 860px; margin: 0 auto; padding: 36px 32px 90px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.case-footer .back-btn { margin-bottom: 0; min-height: 47px; align-items: center; }
.tg-btn {
  text-decoration: none; background: #232220; color: #F6F4EF;
  font-size: 15px; font-weight: 500; padding: 13px 24px;
  border-radius: 999px; display: inline-flex; align-items: center; gap: 9px;
  transition: opacity 0.18s;
}
.tg-btn:hover { opacity: 0.88; }

/* Pages */
#page-home { display: block; }
#page-case { display: none; }

/* Responsive */
@media (max-width: 760px) {
  .cards-grid { grid-template-columns: 1fr; }
  .s-images-grid { grid-template-columns: 1fr; }
  .s-stats-grid { grid-template-columns: 1fr; }
  .s-ba { grid-template-columns: 1fr; }
  .hero h1 { font-size: 26px; }

  .nav-inner { padding: 12px 16px; }
  .hero { padding: 44px 16px 34px; }
  .avatar-wrap { width: 148px; height: 148px; margin-bottom: 26px; }
  .work-section { padding: 8px 16px 24px; }
  .case-article { padding: 40px 16px 24px; }
  .case-body { padding: 32px 16px 24px; }
  .s-prose--gap-before { padding-top: 24px; }
  .s-image + .s-prose,
  .s-images-grid + .s-prose,
  .s-image + .s-metrics,
  .s-images-grid + .s-metrics { padding-top: 20px; }
}

@media (min-width: 761px) and (max-width: 980px) {
  .cards-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .hero { padding-top: 62px; padding-bottom: 48px; }
}

<script>
// ─── Data ───────────────────────────────────────────────────────────────────

function P(text) { return { type: 'para', text }; }
function L(ordered, items) {
  return {
    type: 'list', ordered,
    items: items.map((it, i) => ({
      lead: it.lead || '', text: it.text,
      marker: ordered ? String(i + 1).padStart(2, '0') : '—'
    }))
  };
}
function prose(heading, blocks, sub, gapBefore) { return { stype: 'prose', heading: heading || '', blocks, sub: !!sub, gapBefore: !!gapBefore }; }
function note(text) { return { stype: 'note', text }; }
function care(heading, items) { return { stype: 'care', heading, items }; }
function metrics(heading, stats, note) { return { stype: 'metrics', heading, stats, note: note || '' }; }
function img(caption, src) { return { stype: 'image', caption, src: src || '' }; }
function imgs(items) { return { stype: 'images', items }; }
function ba(before, after) { return { stype: 'ba', before, after }; }

const CASES = [
  {
    id: 'case1', company: 'СберЗдоровье',
    title: 'Запись в клинику по ДМС',
    homeTitle: 'Запись в клинику по ДМС для СберЗдоровья',
    summary: 'Превратил чат с оператором в структурированную заявку — меньше ручных уточнений, быстрее обработка.',
    year: '2023', role: 'Product Designer',
    metric: '40% → 20% консультаций в чате по теме записи',
    coverImg: 'assets/case1-cover-time-crop.png',
    platform: 'Mobile',
    effect: '40% → 20% консультаций в чате по теме записи · 3 → 2.25 консультаций с медсоветником на одного пользователя в месяц',
    note: '',
    sections: [
      img('короткий путь записи в клинику', 'assets/case1-top-flow.png'),
      prose('Контекст', [
        P('У пользователей цифрового ДМС не было автоматической записи по слотам клиник. Любая запись проходила через чат с командой медсопровождения. При этом запись не могла быть мгновенной: медсоветник всё равно должен был согласовать вариант с клиникой.')
      ]),
      prose('Проблема', [
        P('Для клиента процесс был неудобным: нужно было ждать свободного медсоветника, вручную описывать пожелания в чате, не видя карту клиник и доступные варианты по датам.'),
        P('Для бизнеса это создавало дополнительную нагрузку на команду медсопровождения: каждый раз приходилось собирать одни и те же данные из свободного текста.')
      ]),
      prose('Задача', [
        P('Спроектировать сценарий записи, который собирает ровно те данные, которые медсоветник иначе уточняет вручную в чате.')
      ]),
      prose('Цели', [
        L(false, [
          { text: 'Снизить долю консультаций в чате по теме записи.' },
          { text: 'Сократить среднее количество консультаций с медсоветником на пользователя.' },
          { text: 'Сделать процесс записи понятнее для клиента: карта клиник, выбор дат, статус заявки.' }
        ])
      ]),
      prose('Моя роль', [
        P('Я вёл проработку задачи от разбора ручного процесса до передачи в разработку:'),
        L(false, [
          { text: 'discovery с командой медсопровождения;' },
          { text: 'формулирование проектных гипотез;' },
          { text: 'проектирование флоу и структуры заявки;' },
          { text: 'клиентское исследование выбора времени;' },
          { text: 'UI финальных экранов;' },
          { text: 'авторский надзор.' }
        ])
      ]),
      prose('Интервью с командой медсопровождения', [
        P('Я разобрал текущий путь записи и сгруппировал данные, которые команда медсопровождения обычно собирала вручную: услуга и тип приёма, клиника, удобные дни и интервалы, документы, пожелания по врачу и запасной сценарий, если записаться не получится.')
      ]),
      note('Отдельно заметил сценарий: часть клиентов уже записывается в клинику самостоятельно, но всё равно идёт в чат за гарантийным письмом. Для них полноценная заявка на запись была лишней.'),
      care('Проектные гипотезы', [
        { lead: '', text: 'Если попросить клиента выбрать несколько удобных дней и интервалов, у медсоветника будет запасной вариант для записи, а клиенту не придётся возвращаться в чат для повторных уточнений.' },
        { lead: '', text: 'Если заранее спросить, что делать, если записаться в выбранную клинику не получится, можно сократить лишний круг коммуникации: искать другую клинику, другое время или вернуться к клиенту.' },

// ─── Rendering ──────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function fmt(str) {
  return esc(str)
    .replace(/(\d[\d.,%]*)\s*→\s*(\d[\d.,%]*)/g, '$1&nbsp;→&nbsp;$2')
    .replace(/(\d+)\s+из\s+(\d+)/giu, '$1&nbsp;из&nbsp;$2')
    .replace(/(\d+(?:[.,]\d+)?(?:[–-]\d+(?:[.,]\d+)?)?%?)\s+([A-Za-zА-Яа-яЁё]+)/gu, '$1&nbsp;$2')
    .replace(/(\[[A-Za-zА-Яа-яЁё]\]%?)\s+([A-Za-zА-Яа-яЁё]+)/gu, '$1&nbsp;$2')
    .replace(/(^|[\s(«„"“])((?:и|в|с|к|о|у|а|но|по|из|на|за|от|до|во|со|ко|об|не|для|над|под|при|без|или))\s+/giu, '$1$2&nbsp;');
}

function renderCaption(str) {
  const capped = String(str).replace(/^(\s*)([а-яё])/u, (_, space, letter) => space + letter.toUpperCase());
  return fmt(capped).replace('финальный', '<strong>финальный</strong>');
}

function renderBlock(b) {
  if (b.type === 'para') {
    return `<p class="s-para">${fmt(b.text)}</p>`;
  }
  if (b.type === 'list') {
    const items = b.items.map(it => {
      const lead = it.lead ? `<span class="s-list-lead">${fmt(it.lead)} </span>` : '';
      const markerCls = it.marker === '—' ? 's-list-marker s-list-marker--dash' : 's-list-marker';
      return `<div class="s-list-item">
        <span class="${markerCls}">${esc(it.marker)}</span>
        <span class="s-list-text">${lead}${fmt(it.text)}</span>
      </div>`;
    }).join('');
    return `<div class="s-list">${items}</div>`;
  }
  return '';
}

function renderSection(s) {
  if (s.stype === 'prose') {
    const cls = s.sub ? 's-subheading' : 's-heading';
    const tag = s.sub ? 'h3' : 'h2';
    const heading = s.heading ? `<${tag} class="${cls}">${fmt(s.heading)}</${tag}>` : '';
    const blocks = s.blocks.map(renderBlock).join('');
    const gapCls = s.gapBefore ? ' s-prose--gap-before' : '';
    return `<div class="s-prose${gapCls}">${heading}${blocks}</div>`;
  }
  if (s.stype === 'note') {
    return `<div class="s-note"><p>${fmt(s.text)}</p></div>`;
  }
  if (s.stype === 'care') {
    const items = s.items.map(it => {
      const lead = it.lead ? `<span class="s-care-item-lead">${fmt(it.lead)} </span>` : '';
      return `<div class="s-care-item">${lead}${fmt(it.text)}</div>`;
    }).join('');
    return `<div class="s-care">
      <div class="s-care-head">
        <h2 class="s-care-heading">${fmt(s.heading)}</h2>
      </div>
      ${items}
    </div>`;
  }
  if (s.stype === 'metrics') {
    const stats = s.stats.map(st => {
      let val;
      if (st.single) {
        val = `<span>${fmt(st.single)}</span>`;
      } else {
        val = `<span class="s-stat-from">${fmt(st.from)}</span><span class="s-stat-arrow">→</span><span>${fmt(st.to)}</span>`;
      }
      return `<div class="s-stat">
        <div class="s-stat-val">${val}</div>
        <div class="s-stat-label">${fmt(st.label)}</div>
      </div>`;
    }).join('');
    const note = s.note ? `<p class="s-metrics-note">${fmt(s.note)}</p>` : '';
    const heading = s.heading ? `<h2 class="s-heading">${fmt(s.heading)}</h2>` : '';
    return `<div class="s-metrics">
      ${heading}
      <div class="s-stats-grid">${stats}</div>
      ${note}
    </div>`;
  }
  if (s.stype === 'image') {
    const inner = s.src
      ? `<img src="${esc(s.src)}" alt="${esc(s.caption)}">`
      : `<div class="s-image-placeholder"><span>IMG · ${esc(s.caption)}</span></div>`;
    return `<figure class="s-image">${inner}</figure>`;
  }
  if (s.stype === 'images') {
    const sourceItems = s.items || s.captions || [];
    const cells = sourceItems.map(item => {
      if (typeof item === 'string') {
        return `<div class="s-images-cell"><span>IMG · ${fmt(item)}</span></div>`;
      }
      const caption = item.caption ? `<div class="s-images-caption">${renderCaption(item.caption)}</div>` : '';
      const winnerCls = item.winner ? ' s-images-cell--winner' : '';
      if (item.src) {
        return `<figure class="s-images-cell s-images-cell--media${winnerCls}">
          <div class="s-images-media"><img src="${esc(item.src)}" alt="${esc(item.caption || '')}"></div>
          ${caption}
        </figure>`;
      }
      return `<div class="s-images-cell"><span>IMG · ${fmt(item.caption || '')}</span></div>`;
    }).join('');
    return `<div class="s-images-grid">${cells}</div>`;
  }
  if (s.stype === 'ba') {
    const items = arr => arr.map(t => `<div class="s-ba-item">${fmt(t)}</div>`).join('');
    return `<div class="s-ba">
      <div class="s-ba-col s-ba-before"><div class="s-ba-label">Было</div>${items(s.before)}</div>
      <div class="s-ba-col s-ba-after"><div class="s-ba-label">Стало</div>${items(s.after)}</div>
    </div>`;
  }
  return '';
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = CASES.map(c => `
    <button class="card" onclick="goCase('${c.id}')">
      <div class="card-cover">
        ${c.coverImg ? `<img src="${esc(c.coverImg)}" alt="${esc(c.title)}">` : ''}
      </div>
      <div class="card-title">${fmt(c.homeTitle || c.title)}</div>
      <div class="card-summary">${fmt(c.summary)}</div>
      <div class="card-footer">
        <span class="card-metric">${fmt(c.metric)}</span>
        <span class="card-cta">Открыть&nbsp;→</span>
      </div>
    </button>
  `).join('');
}

function renderCase(c) {
  const effectItems = String(c.effect || c.metric)
    .split('·')
    .map(x => x.trim())
    .filter(Boolean);
  const effectHtml = effectItems.length
    ? `<div class="case-effect-chips">${effectItems.map(x => `<span class="case-effect-chip">${fmt(x)}</span>`).join('')}</div>`
    : '';
  document.getElementById('case-title').innerHTML = fmt(c.title);
  document.getElementById('case-meta-row').innerHTML = `
    <div class="case-meta-main">
      <div><div class="case-meta-label">Компания</div><div class="case-meta-val">${fmt(c.company)}</div></div>
      <div><div class="case-meta-label">Роль</div><div class="case-meta-val">${fmt(c.role)}</div></div>
      <div><div class="case-meta-label">Платформа</div><div class="case-meta-val">${fmt(c.platform)}</div></div>
      ${c.status ? `<div><div class="case-meta-label">Статус</div><div class="case-meta-val">${fmt(c.status)}</div></div>` : ''}
    </div>
    ${effectHtml}
  `;
  const noteEl = document.getElementById('case-note');
  if (c.note) {
    noteEl.textContent = c.note;
    noteEl.style.display = '';
  } else {
    noteEl.style.display = 'none';
  }
  document.getElementById('case-body').innerHTML = c.sections.map(renderSection).join('');
}

// ─── Routing ────────────────────────────────────────────────────────────────

function showPage(id) {
  document.getElementById('page-home').style.display = id === 'home' ? 'block' : 'none';
  document.getElementById('page-case').style.display = id !== 'home' ? 'block' : 'none';
}

function goCase(id) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  renderCase(c);
  showPage(id);
  if (location.hash.replace('#', '') !== id) location.hash = id;
  window.scrollTo(0, 0);
}

function goHome() {
  showPage('home');
  history.pushState('', document.title, location.pathname + location.search);
  window.scrollTo(0, 0);
}

function handleHash() {
  const h = location.hash.replace('#', '');
  const c = CASES.find(x => x.id === h);
  if (c) { renderCase(c); showPage(c.id); }
  else showPage('home');
}

window.addEventListener('hashchange', handleHash);

// ─── Init ────────────────────────────────────────────────────────────────────

renderCards();
handleHash();
</script>
</body>
</html>
